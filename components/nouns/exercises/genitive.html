<section class="page genitive">

    <section class="hero">
        <p class="eyebrow">Genitive</p>

        <h1>Genitive - Fill the Gap</h1>

        <p>
            Complete each sentence with the correct
            genitive form (e.g. <strong>Annas</strong>,
            <strong>husets</strong>,
            <strong>barnens</strong>).
        </p>
    </section>

    <section class="quiz-shell">

        <div id="quiz-score" class="quiz-score"></div>

        <form id="gap-quiz" class="quiz-grid"></form>

        <div class="quiz-actions">
            <button
                id="quiz-submit"
                class="quiz-submit"
                type="submit"
                form="gap-quiz"
            >
                Submit Answers
            </button>

            <button
                id="quiz-reset"
                class="quiz-reset"
                type="button"
            >
                New Quiz
            </button>
        </div>

    </section>

</section>
