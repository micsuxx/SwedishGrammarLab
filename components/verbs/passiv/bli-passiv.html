<section class="page passiv">

    <section class="hero">
        <p class="eyebrow"><i>Bli</i>-passiv</p>

        <h1><i>Bli</i>-Passiv - Transform the Sentence</h1>

        <p>
            Rewrite the sentence using the bli-passive form.
        </p>
        <p>
            Do not use s-passiv or vara.
        </p>
        <p>
            Example:
            <br>
            <strong>De stänger butiken klockan 18.</strong>
            <br>
            →
            <strong>Butiken blir stängd klockan 18.</strong>
        </p>
    </section>

    <section class="quiz-shell">

        <div id="quiz-score" class="quiz-score"></div>

        <form id="gap-quiz" class="quiz-grid"></form>

        <div class="quiz-actions">
            <button
                id="quiz-submit"
                class="quiz-submit"
                type="submit"
                form="gap-quiz"
            >
                Submit Answers
            </button>

            <button
                id="quiz-reset"
                class="quiz-reset"
                type="button"
            >
                New Quiz
            </button>
        </div>

    </section>

</section>
