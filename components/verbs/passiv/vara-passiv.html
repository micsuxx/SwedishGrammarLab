<section class="page passiv">

    <section class="hero">
        <p class="eyebrow"><i>Vara</i>-passiv</p>

        <h1><i>Vara</i>-Passiv - Transform the Sentence</h1>

        <p>
            Rewrite the sentence using the vara-passive form.
        </p>
        <p>
            Do not use s-passiv or bli.
        </p>
        <p>
            Example:
            <br>
            <strong>Värdinnan serverar maten.</strong>
            <br>
            →
            <strong>Maten är serverad.</strong>
        </p>
    </section>

    <section class="quiz-shell">

        <div id="quiz-score" class="quiz-score"></div>

        <form id="gap-quiz" class="quiz-grid"></form>

        <div class="quiz-actions">
            <button
                id="quiz-submit"
                class="quiz-submit"
                type="submit"
                form="gap-quiz"
            >
                Submit Answers
            </button>

            <button
                id="quiz-reset"
                class="quiz-reset"
                type="button"
            >
                New Quiz
            </button>
        </div>

    </section>

</section>
